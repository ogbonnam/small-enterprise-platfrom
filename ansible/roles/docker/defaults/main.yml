---
docker_settings:
  channel: stable
  architecture: amd64
  packages:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin
  network:
    name: platform-network
    driver: bridge
  daemon:
    log_driver: json-file
    max_size: "10m"
    max_file: "5"
